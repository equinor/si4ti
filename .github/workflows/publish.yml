name: Wheels

on:
  push:
    branches: [main]
    tags:
      - '*'
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  wheels:
    name: Build wheels on ${{ matrix.os }} ${{ matrix.arch }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            arch: x86_64
            cxx_flags: '-march=x86-64-v3'
          - os: macos-13
            arch: x86_64
            macos_target: '13.0'
            cxx_flags: '-march=x86-64-v3'
          - os: macos-latest
            arch: arm64
            macos_target: '14.0'
            # It is unclear if there is any target specific optimisation that
            # we can choose here that is better than what the compiler chooses
            # by default. Therefore, we don't specify anything for arm64.
            cxx_flags:

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: 'true'

      # Used to host cibuildwheel
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install cibuildwheel
        run: python -m pip install cibuildwheel

      # Minimum supported macOS version set to 13.0 (amd64) and 14.0 (arm64)
      # due to OpenMP installed via Homebrew requiring rather new MacOS
      # versions. If we want to support older platforms, we would need to build
      # our own OpenMP library from source.
      - name: Set MacOS deployment target
        if: ${{ startsWith(matrix.os, 'macos') }}
        run: |
          echo "MACOSX_DEPLOYMENT_TARGET=${{ matrix.macos_target }}" >> $GITHUB_ENV
      - name: Build wheels
        # Majority of cibuildhweel configuration is done via pyproject.toml,
        # but for options specific to a MacOS target platform, i.e., an option
        # different for arm64 than for x86_64, it is easiest to set them in the
        # workflow file.
        env:
          CIBW_ARCHS: ${{ matrix.arch }}
          CXXFLAGS: ${{ matrix.cxx_flags }}
        run: |
          python -m cibuildwheel --output-dir wheelhouse .

      - uses: actions/upload-artifact@v4
        with:
          name: wheel-${{ matrix.os }}-${{ matrix.arch }}
          path: ./wheelhouse/*.whl
          # We do not need to keep the artifacts for long because they are
          # supposed to be pushed to PyPI.
          retention-days: 7

  # Building source distribution
  sdist:
    name: Build sdist
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: 'true'

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install build
        run: python -m pip install build

      - name: Build source distribution
        run: |
          python -m build --sdist

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake build-essential libboost-dev \
            libeigen3-dev libfftw3-dev

      - name: Install and test sdist (FFTW off)
        run: |
          python -m venv venv-fftw-off
          source venv-fftw-off/bin/activate
          pip install --upgrade pip
          pip install pytest pytest-memray xtgeo segyio
          pip install -Ccmake.define.USE_FFTW=OFF $(ls dist/*) --verbose
          cd python
          python -m pytest --memray tests/

      - name: Install and test sdist (FFTW on)
        run: |
          python -m venv venv-fftw-on
          source venv-fftw-on/bin/activate
          pip install --upgrade pip
          pip install pytest pytest-memray xtgeo segyio
          pip install -Ccmake.define.USE_FFTW=ON $(ls dist/*) --verbose
          cd python
          python -m pytest --memray tests/

      - uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: ./dist/*
          # We do not need to keep the artifacts for long because they are
          # supposed to be pushed to PyPI.
          retention-days: 7

  publish:
    needs: [wheels, sdist]
    name: Publish wheels to PyPI
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags')
    permissions:
      id-token: write

    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: wheel-*
          merge-multiple: true
          path: ./wheelhouse/

      - uses: actions/download-artifact@v4
        with:
          pattern: sdist
          merge-multiple: true
          path: ./wheelhouse/

      - name: Publish wheels to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: ./wheelhouse/
